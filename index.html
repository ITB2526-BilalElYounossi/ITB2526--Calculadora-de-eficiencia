<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITB Leaks - Calculadora Energética</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ITB Leaks: Panel de Eficiencia</h1>
        <p>Análisis de datos y optimización de recursos</p>
    </header>

    <main class="container">
        <section id="stats" class="card">
            <h2>📊 Resumen de Datos Actuales</h2>
            <div class="grid-stats">
                <div class="stat-item">
                    <span>Producción Solar Total</span>
                    <strong id="prod-total">1006.81 kWh</strong>
                </div>
                <div class="stat-item">
                    <span>Autoconsumo Medio</span>
                    <strong id="auto-total">97.36%</strong>
                </div>
                <div class="stat-item">
                    <span>Gasto Facturado</span>
                    <strong id="gasto-total">5.965,75 €</strong>
                </div>
            </div>
        </section>

        <section id="calculator" class="card">
            <h2>💰 Calculadora de Ahorro</h2>
            <div class="form-group">
                <label for="price">Precio de la luz actual (€/kWh):</label>
                <input type="number" id="price" value="0.15" step="0.01">
            </div>
            <button onclick="calculateSavings()">Calcular Impacto Económico</button>
            <div id="results" class="results-box">
                </div>
        </section>

        <section id="efficiency" class="card">
            <h2>🌱 Plan de Mejora de Eficiencia</h2>
            <ul id="tips-list">
                </ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
